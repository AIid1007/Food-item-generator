<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF3E7">
  <meta name="description" content="A meal planner for Indian households — smart-random, offline, private. No AI APIs, ever.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rasoi">
  <link rel="manifest" href="manifest.json">
  <title>Rasoi Randomizer</title>

  <!-- Favicon: inline SVG diya, no extra request -->
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 16c0 2.5 4 4 9 4s9-1.5 9-4M3 16h18M12 12c-1-2-2-3-2-5a2 2 0 0 1 4 0c0 2-1 3-2 5z' fill='%23C45A3E' stroke='%232E1F1A' stroke-width='1.5' stroke-linejoin='round'/></svg>">

  <!-- Fonts: Fraunces (display) + Inter (body). Preconnect for speed. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main app mount point -->
  <div id="app"></div>

  <!-- Modal host (rendered above the app) -->
  <div id="modal-host"></div>

  <!-- Toast host (fixed, bottom-center) -->
  <div class="toast-host" id="toast-host"></div>

  <!-- Noscript fallback -->
  <noscript>
    <div style="padding: 40px; text-align: center; font-family: serif;">
      <h1>Rasoi Randomizer needs JavaScript to run.</h1>
      <p>It's a small static app — no servers, no tracking. Please enable JavaScript and refresh.</p>
    </div>
  </noscript>

  <!-- Order matters: seed library + festivals first, then the app -->
  <script src="seed-library.js"></script>
  <script src="festivals.js"></script>
  <script src="app.js"></script>

  <!-- PWA: register service worker (only over http/https, not file://) -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed', err);
        });
      });
    }
  </script>
</body>
</html>
